<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>luma-intel</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f2430;
    --border: #2a3040;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #7c9cff;
    --good: #5ad19a;
    --warn: #f0b561;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header { padding: 24px 28px 14px; border-bottom: 1px solid var(--border); }
  h1 { margin: 0; font-size: 20px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  main { padding: 20px 28px 60px; max-width: 1100px; }
  h2 { font-size: 14px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin: 28px 0 10px; }
  input[type=text] {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: #0b0e14; color: var(--text); border: 1px solid var(--border); font-size: 14px;
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  .pastezone {
    margin-top: 10px; min-height: 96px;
    border: 2px dashed var(--border); border-radius: 12px; padding: 16px;
    background: var(--panel); outline: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .pastezone:focus { border-color: var(--accent); background: var(--panel-2); }
  .pastezone:empty::before { content: "Click here, then paste (Cmd/Ctrl+V) the Luma guest list…"; color: var(--muted); }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; align-items: center; }
  button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #0b0e14; border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .5; cursor: default; }
  button.tiny { padding: 4px 9px; font-size: 12px; }
  .stat { color: var(--muted); font-size: 13px; margin-left: auto; }
  .status { margin: 4px 0 0; color: var(--muted); font-size: 13px; min-height: 18px; }
  .status.err { color: var(--warn); }
  .bar { height: 6px; border-radius: 999px; background: var(--panel-2); overflow: hidden; margin-top: 10px; display: none; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .2s ease; }

  .evlist { list-style: none; padding: 0; margin: 0; }
  .evrow { display: flex; gap: 12px; align-items: center; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; background: var(--panel); }
  .evrow .evmain { flex: 1; min-width: 0; }
  .evrow .evname { font-weight: 600; }
  .evrow .evmeta { color: var(--muted); font-size: 12px; }

  .person { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-top: 12px; background: var(--panel); }
  .person.known { border-color: var(--good); }
  .person h3 { margin: 0 0 6px; font-size: 16px; }
  .badge { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
  .badge.known { background: rgba(90,209,154,.12); color: var(--good); border: 1px solid rgba(90,209,154,.4); }
  .badge.count { background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
  .meta { color: var(--muted); font-size: 13px; margin: 2px 0; }
  .meta .lbl { color: var(--muted); display: inline-block; min-width: 96px; }
  .bio { font-size: 13px; margin: 6px 0; }
  a { color: var(--accent); text-decoration: none; word-break: break-word; }
  a:hover { text-decoration: underline; }
  .soc { display: inline-flex; gap: 8px; flex-wrap: wrap; }
  .soc a { font-size: 12px; padding: 1px 8px; border: 1px solid var(--border); border-radius: 999px; }
  .empty { color: var(--muted); padding: 12px 2px; }
  .note { color: var(--muted); font-size: 12px; margin-top: 14px; }
</style>
</head>
<body>
<header>
  <h1>luma-intel</h1>
  <div class="sub">Copy and paste the Luma guest list.</div>
</header>

<main>
  <h2>Add or check an event</h2>
  <input type="text" id="eventUrl" placeholder="Luma event URL (e.g. https://lu.ma/abc123)" autocomplete="off" />
  <div id="zone" class="pastezone" contenteditable="true" spellcheck="false"></div>
  <div class="toolbar">
    <button id="save">Save attended event</button>
    <button class="primary" id="check">Check this event</button>
    <button id="clear">Clear</button>
    <span class="stat" id="stat"></span>
  </div>
  <div class="bar" id="bar"><i></i></div>
  <div class="status" id="status"></div>

  <h2>Your events</h2>
  <div class="toolbar">
    <button id="fetchHosts">Fetch hosts (all events)</button>
    <button id="export">Export data</button>
    <button id="import">Import data</button>
    <input type="file" id="importFile" accept="application/json,.json" hidden />
  </div>
  <ul class="evlist" id="evlist"><li class="empty">No saved events yet.</li></ul>

  <h2>People you've met</h2>
  <div class="toolbar">
    <button id="showPeople">Show people you've met</button>
    <span class="stat" id="peopleStat"></span>
  </div>
  <div id="people"></div>

  <h2 id="resultsHead" style="display:none">Results</h2>
  <div class="toolbar" id="resultTools" style="display:none">
    <button id="copyMd">Copy markdown</button>
    <button id="downloadMd">Download .md</button>
    <span class="stat" id="resultStat"></span>
  </div>
  <div id="results"></div>
  <div class="note" id="note"></div>
</main>

<script>
const LUMA_BASE = "https://luma.com";
const state = { guests: [], result: null };

// The page calls one stateless endpoint (/api/luma) to fetch Luma pages — the
// only thing that can't run in the browser (CORS). Everything else lives here.
// Same-origin by default; override with ?api=http://localhost:5178 to point the
// hosted page at a server running on your own machine.
const apiBase = (new URLSearchParams(location.search).get("api") || "").replace(/\/$/, "");
const api = (path) => apiBase + path;
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

const $ = (id) => document.getElementById(id);
const zone = $("zone"), eventUrl = $("eventUrl"), stat = $("stat");
const statusEl = $("status"), bar = $("bar"), barFill = bar.querySelector("i");
const evlist = $("evlist"), results = $("results"), noteEl = $("note");
const resultsHead = $("resultsHead"), resultTools = $("resultTools"), resultStat = $("resultStat");

// --- local store (everything lives in the browser) --------------------------
const STORE_KEY = "luma-intel-store";
function loadStore() {
  try { const s = JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); s.events ||= []; s.people ||= {}; return s; }
  catch { return { events: [], people: {} }; }
}
function saveStore(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

// --- identity helpers -------------------------------------------------------
function resolveUserUrl(s) {
  if (!s) return null;
  try {
    if (/^https?:\/\//i.test(s)) {
      const u = new URL(s);
      if (/^\/user\//.test(u.pathname)) return LUMA_BASE + u.pathname.replace(/\/$/, "");
      return null;
    }
  } catch { return null; }
  if (s.startsWith("/user/")) return LUMA_BASE + s.replace(/\/$/, "");
  return null;
}
function normGuests(list) {
  const byUrl = new Map();
  for (const g of list || []) {
    const url = resolveUserUrl(typeof g === "string" ? g : (g && (g.profileUrl || g.href || g.url)));
    if (!url || byUrl.has(url)) continue;
    byUrl.set(url, { profileUrl: url, name: (g && g.name) || null, username: url.replace("https://luma.com/user/", "") });
  }
  return [...byUrl.values()];
}

// --- clipboard parsing (keeps the /user/ profile links) ---------------------
function profilePath(href) {
  try {
    const u = new URL(href, LUMA_BASE);
    if (/^\/user\/[^/]+/.test(u.pathname)) return u.pathname.replace(/\/$/, "");
  } catch {}
  return null;
}
function cleanName(s) { return (s || "").replace(/^Profile picture for\s*/i, "").replace(/\s+/g, " ").trim(); }
function parseHtml(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const guests = [], seen = new Set();
  for (const a of doc.querySelectorAll("a[href]")) {
    const path = profilePath(a.getAttribute("href") || "");
    if (!path) continue;
    const profileUrl = LUMA_BASE + path;
    if (seen.has(profileUrl)) continue;
    seen.add(profileUrl);
    let name = "";
    const nameEl = a.querySelector(".name");
    if (nameEl) name = nameEl.getAttribute("title") || nameEl.textContent;
    if (!name) { const img = a.querySelector("img[alt], img[title]"); if (img) name = img.getAttribute("alt") || img.getAttribute("title"); }
    if (!name) name = a.textContent;
    guests.push({ name: cleanName(name), profileUrl, username: path.replace("/user/", "") });
  }
  return guests;
}

// --- network (only Luma fetches go through the server) ----------------------
async function luma(op, url) {
  const res = await fetch(api(`/api/luma?op=${op}&url=${encodeURIComponent(url)}`));
  const text = await res.text();
  if (!text) throw new Error("no response from the fetch service");
  let data;
  try { data = JSON.parse(text); }
  catch { throw new Error("the fetch service isn't responding with JSON — is it deployed? (Netlify function /api/luma)"); }
  if (!res.ok) throw new Error(data.error || `error ${res.status}`);
  return data;
}
const fetchProfile = (url) => luma("profile", url);
const fetchEventMeta = (url) => luma("event", url);

// Resolve profiles, reusing the browser cache; newly fetched profiles are saved.
async function enrichGuests(urls, onProgress) {
  const store = loadStore();
  const people = []; let hits = 0, fetched = 0, done = 0;
  for (const url of urls) {
    let person = store.people[url];
    if (person) { hits++; }
    else {
      try { person = await fetchProfile(url); } catch (e) { person = { profileUrl: url, error: e.message }; }
      if (!person.error) store.people[url] = person;
      fetched++;
      await sleep(350); // be polite to Luma
    }
    people.push(person);
    onProgress && onProgress(++done, urls.length, person);
  }
  saveStore(store);
  return { people, hits, fetched };
}

// --- markdown ---------------------------------------------------------------
const SOCIAL_LABEL = { twitter: "x" };
const SOCIAL_KEYS = ["linkedin", "instagram", "twitter", "website", "youtube", "tiktok", "github"];
function peopleMarkdown(people, title) {
  const ok = people.filter((p) => !p.error);
  const out = [`# ${title || "Luma rolodex"} — ${ok.length} people`, `generated ${new Date().toISOString()}`, ""];
  for (const p of ok) {
    out.push(`## ${p.name || p.username || "(unknown)"}${p.verified ? " ✓" : ""}`);
    if (p.username) out.push(`- username: ${p.username}`);
    out.push(`- profile: ${p.profileUrl}`);
    for (const k of SOCIAL_KEYS) if (p.socials && p.socials[k]) out.push(`- ${SOCIAL_LABEL[k] || k}: ${p.socials[k]}`);
    if (p.bio) out.push(`- bio: ${p.bio.replace(/\n+/g, " ")}`);
    out.push(`- events attended: ${p.attendedCount ?? "?"}`);
    out.push(`- events hosted: ${p.hostedCount ?? "?"}`);
    if (p.seenAt && p.seenAt.length) out.push(`- met before at: ${p.seenAt.map((e) => `[${e.name}](${e.url})`).join(", ")}`);
    out.push("");
  }
  const errs = people.filter((p) => p.error);
  if (errs.length) {
    out.push("---", "", `## Could not fetch (${errs.length})`);
    for (const e of errs) out.push(`- ${e.profileUrl} — ${e.error}`);
    out.push("");
  }
  return out.join("\n");
}

// --- rendering --------------------------------------------------------------
function escapeHtml(s = "") { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
function escapeAttr(s = "") { return String(s).replace(/"/g, "&quot;").replace(/</g, "&lt;"); }
function socialsHtml(socials = {}) {
  const items = SOCIAL_KEYS.filter((k) => socials[k])
    .map((k) => `<a href="${escapeAttr(socials[k])}" target="_blank" rel="noopener">${SOCIAL_LABEL[k] || k}</a>`);
  return items.length ? `<span class="soc">${items.join("")}</span>` : '<span class="empty">—</span>';
}
function personHtml(p) {
  if (p.error) {
    return `<div class="person"><h3>${escapeHtml(p.profileUrl)}</h3><div class="meta">could not fetch — ${escapeHtml(p.error)}</div></div>`;
  }
  const known = (p.seenAt || []).length;
  const seen = known
    ? `<div class="meta"><span class="lbl">met before at</span>${p.seenAt.map(e => `<a href="${escapeAttr(e.url)}" target="_blank" rel="noopener">${escapeHtml(e.name)}</a>`).join(", ")}</div>`
    : "";
  return `<div class="person${known ? " known" : ""}">
    <h3>${escapeHtml(p.name || p.username || "(unknown)")}${known ? `<span class="badge known">met at ${known} of your events</span>` : ""}</h3>
    <div class="meta"><span class="lbl">profile</span><a href="${escapeAttr(p.profileUrl)}" target="_blank" rel="noopener">${escapeHtml(p.profileUrl.replace("https://luma.com", "luma.com"))}</a></div>
    <div class="meta"><span class="lbl">socials</span>${socialsHtml(p.socials)}</div>
    ${p.bio ? `<div class="bio">${escapeHtml(p.bio)}</div>` : ""}
    <div class="meta"><span class="lbl">attended</span>${p.attendedCount ?? "?"} &nbsp;·&nbsp; hosted ${p.hostedCount ?? "?"}</div>
    ${seen}
  </div>`;
}
function renderResult(result) {
  state.result = result;
  const people = [...result.people].sort((a, b) => (b.seenAt?.length || 0) - (a.seenAt?.length || 0));
  resultsHead.style.display = "block";
  resultTools.style.display = "flex";
  const title = result.event?.name ? `${result.event.name} — ` : "";
  resultStat.textContent = `${title}${result.stats.known} familiar · ${result.stats.resolved}/${result.stats.total} profiles`;
  results.innerHTML = people.length ? people.map(personHtml).join("") : '<div class="empty">No one resolved.</div>';
  noteEl.textContent = "Saved in your browser. Use Export to back it up or move it to another device.";
}

// --- people you've met (ranked client-side) ---------------------------------
function rankPeople(store) {
  const byUrl = new Map();
  for (const ev of store.events) for (const g of ev.guests) {
    if (!byUrl.has(g.profileUrl)) byUrl.set(g.profileUrl, { ...g, events: [] });
    byUrl.get(g.profileUrl).events.push({ id: ev.id, name: ev.name, url: ev.url });
  }
  const people = [...byUrl.values()].map((p) => {
    const c = store.people[p.profileUrl] || {};
    return { profileUrl: p.profileUrl, name: c.name || p.name || p.username, username: c.username || p.username,
             socials: c.socials || {}, bio: c.bio || null, count: p.events.length, events: p.events };
  });
  people.sort((a, b) => b.count - a.count || (a.name || "").localeCompare(b.name || ""));
  return people;
}
function rankedRow(p) {
  const badgeClass = p.count > 1 ? "known" : "count";
  const events = (p.events || []).map(e => `<a href="${escapeAttr(e.url)}" target="_blank" rel="noopener">${escapeHtml(e.name)}</a>`).join(", ");
  return `<div class="person${p.count > 1 ? " known" : ""}">
    <h3>${escapeHtml(p.name || p.username || "(unknown)")}<span class="badge ${badgeClass}">${p.count} event${p.count === 1 ? "" : "s"}</span></h3>
    <div class="meta"><span class="lbl">profile</span><a href="${escapeAttr(p.profileUrl)}" target="_blank" rel="noopener">${escapeHtml(p.profileUrl.replace("https://luma.com", "luma.com"))}</a></div>
    <div class="meta"><span class="lbl">socials</span>${socialsHtml(p.socials)}</div>
    ${p.bio ? `<div class="bio">${escapeHtml(p.bio)}</div>` : ""}
    <div class="meta"><span class="lbl">events</span>${events}</div>
  </div>`;
}
function showPeople() {
  const people = rankPeople(loadStore());
  $("peopleStat").textContent = people.length ? `${people.length} people · most frequent first` : "";
  $("people").innerHTML = people.length ? people.map(rankedRow).join("") : '<div class="empty">No people yet — save some events first.</div>';
}

// --- saved events -----------------------------------------------------------
function eventsSorted(store) {
  return [...store.events].sort((a, b) => (b.startAt || b.addedAt || "").localeCompare(a.startAt || a.addedAt || ""));
}
function loadEvents() {
  const store = loadStore();
  if ($("people").children.length) showPeople();
  const events = eventsSorted(store);
  if (!events.length) { evlist.innerHTML = '<li class="empty">No saved events yet.</li>'; return; }
  evlist.innerHTML = events.map(ev => `
    <li class="evrow" data-id="${escapeAttr(ev.id)}">
      <div class="evmain">
        <div class="evname"><a href="${escapeAttr(ev.url)}" target="_blank" rel="noopener">${escapeHtml(ev.name)}</a></div>
        <div class="evmeta">${ev.guests.length} guests${ev.city ? " · " + escapeHtml(ev.city) : ""}${ev.startAt ? " · " + escapeHtml(ev.startAt.slice(0,10)) : ""}</div>
      </div>
      <button class="tiny" data-act="hosts">Add hosts</button>
      <button class="tiny" data-act="check">Check</button>
      <button class="tiny" data-act="delete">Delete</button>
    </li>`).join("");
}
evlist.addEventListener("click", (e) => {
  const btn = e.target.closest("button"); if (!btn) return;
  const id = btn.closest(".evrow").dataset.id;
  if (btn.dataset.act === "delete") {
    const store = loadStore(); store.events = store.events.filter((ev) => ev.id !== id); saveStore(store); loadEvents();
  } else if (btn.dataset.act === "check") {
    analyze({ eventId: id });
  } else if (btn.dataset.act === "hosts") {
    fetchHosts({ eventId: id });
  }
});

// --- progress / status ------------------------------------------------------
function setStatus(msg, isErr = false) { statusEl.textContent = msg || ""; statusEl.classList.toggle("err", !!isErr); }
function setBar(done, total) {
  if (!total) { bar.style.display = "none"; return; }
  bar.style.display = "block"; barFill.style.width = Math.round((done / total) * 100) + "%";
}
let busy = false;
async function run(fn) {
  if (busy) return; busy = true; setBar(0, 1);
  const progress = (done, total, msg) => { setBar(done, total); setStatus(`Reading profiles — ${done}/${total}${msg ? " · " + msg : ""}`); };
  try { await fn(progress); }
  catch (e) { setStatus(e.message || String(e), true); }
  finally { busy = false; setBar(0, 0); }
}

// --- actions ----------------------------------------------------------------
function save() {
  const url = eventUrl.value.trim();
  if (!url) return setStatus("Add the event URL first.", true);
  if (!state.guests.length) return setStatus("Paste the guest list first.", true);
  run(async (progress) => {
    setStatus("Reading the event…");
    const meta = await fetchEventMeta(url);
    const all = normGuests([...state.guests, ...(meta.hosts || [])]);
    const { hits, fetched } = await enrichGuests(all.map(g => g.profileUrl), (d, t, p) => progress(d, t, p && (p.name || p.profileUrl)));
    const store = loadStore();
    const id = meta.slug || meta.url;
    const existing = store.events.find((e) => e.id === id);
    const record = { id, url: meta.url, name: meta.name, startAt: meta.startAt, city: meta.city,
                     addedAt: existing?.addedAt || new Date().toISOString(), guests: all };
    if (existing) Object.assign(existing, record); else store.events.push(record);
    saveStore(store);
    setStatus(`Saved “${meta.name}” — ${all.length} guests (${fetched} fetched, ${hits} already cached).`);
    loadEvents();
  });
}

function analyze(payload) {
  results.innerHTML = ""; resultsHead.style.display = "none"; resultTools.style.display = "none"; noteEl.textContent = "";
  run(async (progress) => {
    const store = loadStore();
    let guests, targetEvent = null;
    if (payload.eventId) {
      targetEvent = store.events.find((e) => e.id === payload.eventId);
      if (!targetEvent) throw new Error("unknown saved event");
      guests = targetEvent.guests;
    } else {
      guests = normGuests(payload.guests);
      if (!guests.length) throw new Error("no Luma /user/ profiles found in the guest list");
      if (payload.url) {
        setStatus("Reading the event…");
        let meta = null;
        try { meta = await fetchEventMeta(payload.url); } catch { /* still usable without meta */ }
        if (meta) {
          guests = normGuests([...guests, ...(meta.hosts || [])]);
          const id = meta.slug || meta.url;
          targetEvent = store.events.find((e) => e.id === id) || { id, url: meta.url, name: meta.name, startAt: meta.startAt, city: meta.city };
        }
      }
    }
    const seenIndex = new Map();
    for (const ev of store.events) {
      if (targetEvent && ev.id === targetEvent.id) continue;
      for (const g of ev.guests) {
        if (!seenIndex.has(g.profileUrl)) seenIndex.set(g.profileUrl, []);
        seenIndex.get(g.profileUrl).push({ id: ev.id, name: ev.name, url: ev.url });
      }
    }
    const { people } = await enrichGuests(guests.map(g => g.profileUrl), (d, t, p) => progress(d, t, p && (p.name || p.profileUrl)));
    for (const p of people) { if (!p.error) p.seenAt = seenIndex.get(p.profileUrl) || []; }
    const title = targetEvent?.name || "Luma rolodex";
    const resolved = people.filter(p => !p.error).length;
    const known = people.filter(p => !p.error && p.seenAt?.length).length;
    renderResult({
      event: targetEvent ? { name: targetEvent.name, guestCount: guests.length } : null,
      people, markdown: peopleMarkdown(people, title),
      stats: { total: people.length, resolved, known },
    });
    setStatus(`Done — ${known} of ${resolved} guests you've crossed paths with before.`);
  });
}

function fetchHosts(payload) {
  run(async (progress) => {
    const store = loadStore();
    const targets = payload.eventId ? store.events.filter((e) => e.id === payload.eventId) : store.events;
    if (!targets.length) throw new Error("no matching events");
    const newUrls = new Set(); let hostsAdded = 0;
    for (const ev of targets) {
      setStatus(`Reading hosts for ${ev.name}…`);
      let meta = null;
      try { meta = await fetchEventMeta(ev.url); } catch { /* skip */ }
      if (!meta) continue;
      const had = new Set(ev.guests.map((g) => g.profileUrl));
      ev.guests = normGuests([...ev.guests, ...(meta.hosts || [])]);
      for (const g of ev.guests) if (!had.has(g.profileUrl)) { newUrls.add(g.profileUrl); hostsAdded++; }
    }
    saveStore(store);
    const { hits, fetched } = await enrichGuests([...newUrls], (d, t, p) => progress(d, t, p && (p.name || p.profileUrl)));
    setStatus(`Added ${hostsAdded} host${hostsAdded === 1 ? "" : "s"} across ${targets.length} event${targets.length === 1 ? "" : "s"} (${fetched} fetched, ${hits} cached).`);
    loadEvents();
  });
}

function checkCurrent() {
  if (!state.guests.length) return setStatus("Paste the guest list first.", true);
  analyze({ url: eventUrl.value.trim() || undefined, guests: state.guests });
}

// --- paste capture ----------------------------------------------------------
zone.addEventListener("paste", (e) => {
  e.preventDefault();
  const cd = e.clipboardData || window.clipboardData;
  const html = cd.getData("text/html");
  state.guests = html ? parseHtml(html) : [];
  if (!state.guests.length) {
    zone.innerHTML = `<div class="empty">No Luma profile links found. Select the guest-list rows (each name links to /user/…) and copy again.</div>`;
    stat.textContent = ""; return;
  }
  zone.innerHTML = `<div class="empty">Captured ${state.guests.length} guests.</div>`;
  stat.textContent = `${state.guests.length} captured`;
  setStatus("");
});

// --- wiring -----------------------------------------------------------------
$("save").addEventListener("click", save);
$("check").addEventListener("click", checkCurrent);
$("showPeople").addEventListener("click", showPeople);
$("fetchHosts").addEventListener("click", () => fetchHosts({}));
$("clear").addEventListener("click", () => {
  state.guests = []; zone.innerHTML = ""; eventUrl.value = ""; stat.textContent = "";
  setStatus(""); setBar(0, 0);
  results.innerHTML = ""; resultsHead.style.display = "none"; resultTools.style.display = "none"; noteEl.textContent = "";
});

$("copyMd").addEventListener("click", async () => {
  if (!state.result) return;
  try { await navigator.clipboard.writeText(state.result.markdown); setStatus("Markdown copied to clipboard."); }
  catch { setStatus("Couldn't access clipboard — use Download .md instead.", true); }
});
$("downloadMd").addEventListener("click", () => {
  if (!state.result) return;
  const name = (state.result.event?.name || "luma-rolodex").replace(/[^\w.-]+/g, "-").slice(0, 60) + ".md";
  download(name, state.result.markdown, "text/markdown");
});

$("export").addEventListener("click", () => {
  download("luma-intel-backup.json", JSON.stringify(loadStore(), null, 2), "application/json");
  setStatus("Exported your events and cached profiles.");
});
$("import").addEventListener("click", () => $("importFile").click());
$("importFile").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    let backup;
    try { backup = JSON.parse(await file.text()); }
    catch { throw new Error("that file isn't valid JSON — pick a luma-intel backup file"); }
    if (!backup || !Array.isArray(backup.events)) throw new Error("that doesn't look like a luma-intel backup (no \"events\" list)");
    saveStore({ events: backup.events, people: (backup.people && typeof backup.people === "object") ? backup.people : {} });
    setStatus(`Imported ${backup.events.length} events and ${Object.keys(backup.people || {}).length} cached profiles.`);
    loadEvents();
  } catch (err) { setStatus(`Import failed: ${err.message}`, true); }
  finally { e.target.value = ""; }
});

function download(name, content, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click(); URL.revokeObjectURL(a.href);
}

loadEvents();
</script>
</body>
</html>
