<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>luma-intel</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f2430;
    --border: #2a3040;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #7c9cff;
    --good: #5ad19a;
    --warn: #f0b561;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    padding: 24px 28px 14px;
    border-bottom: 1px solid var(--border);
  }
  h1 { margin: 0; font-size: 20px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  main { padding: 20px 28px 60px; max-width: 1100px; }
  .pastezone {
    min-height: 120px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 18px;
    background: var(--panel);
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .pastezone:focus { border-color: var(--accent); background: var(--panel-2); }
  .pastezone:empty::before {
    content: "Click here, then paste (Cmd/Ctrl+V) the Luma guest list you copied…";
    color: var(--muted);
  }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0; align-items: center; }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  .stat { color: var(--muted); font-size: 13px; margin-left: auto; }
  .status { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .status.err { color: var(--warn); }
  .bar { height: 6px; border-radius: 999px; background: var(--panel-2); overflow: hidden; margin-top: 10px; display: none; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .2s ease; }
  .person { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-top: 12px; background: var(--panel); }
  .person h3 { margin: 0 0 6px; font-size: 16px; }
  .person h3 .ok { color: var(--good); font-size: 12px; margin-left: 6px; }
  .meta { color: var(--muted); font-size: 13px; margin: 2px 0; }
  .meta .lbl { color: var(--muted); display: inline-block; min-width: 96px; }
  .bio { font-size: 13px; margin: 6px 0; }
  a { color: var(--accent); text-decoration: none; word-break: break-word; }
  a:hover { text-decoration: underline; }
  .soc { display: inline-flex; gap: 8px; flex-wrap: wrap; }
  .soc a { font-size: 12px; padding: 1px 8px; border: 1px solid var(--border); border-radius: 999px; }
  .events { margin: 6px 0 0; padding-left: 18px; }
  .events li { font-size: 13px; margin: 2px 0; }
  .empty { color: var(--muted); padding: 14px 2px; }
  .files { color: var(--muted); font-size: 12px; margin-top: 16px; }
  .files code { background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; }
</style>
</head>
<body>
<header>
  <h1>luma-intel</h1>
  <div class="sub">Copy and paste the Luma guest list.</div>
</header>

<main>
  <div id="zone" class="pastezone" contenteditable="true" spellcheck="false"></div>

  <div class="toolbar">
    <button id="clear">Clear</button>
    <span class="stat" id="stat"></span>
  </div>
  <div class="bar" id="bar"><i></i></div>
  <div class="status" id="status"></div>

  <div id="results">
    <div class="empty">Nothing captured yet.</div>
  </div>

  <div class="files" id="files"></div>
</main>

<script>
const LUMA_BASE = "https://luma.com";
const state = { guests: [] };

const zone = document.getElementById("zone");
const results = document.getElementById("results");
const stat = document.getElementById("stat");
const statusEl = document.getElementById("status");
const bar = document.getElementById("bar");
const barFill = bar.querySelector("i");
const filesEl = document.getElementById("files");

// A Luma profile link looks like /user/<username|usr-id> (relative in the copied list).
function profilePath(href) {
  try {
    const u = new URL(href, LUMA_BASE);
    if (/^\/user\/[^/]+/.test(u.pathname)) return u.pathname.replace(/\/$/, "");
  } catch {}
  return null;
}

function cleanName(s) {
  return (s || "").replace(/^Profile picture for\s*/i, "").replace(/\s+/g, " ").trim();
}

function parseHtml(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const guests = [];
  const seen = new Set();
  for (const a of doc.querySelectorAll("a[href]")) {
    const path = profilePath(a.getAttribute("href") || "");
    if (!path) continue;
    const profileUrl = LUMA_BASE + path;
    if (seen.has(profileUrl)) continue;
    seen.add(profileUrl);

    let name = "";
    const nameEl = a.querySelector(".name");
    if (nameEl) name = nameEl.getAttribute("title") || nameEl.textContent;
    if (!name) {
      const img = a.querySelector("img[alt], img[title]");
      if (img) name = img.getAttribute("alt") || img.getAttribute("title");
    }
    if (!name) name = a.textContent;
    name = cleanName(name);

    guests.push({ name, profileUrl, username: path.replace("/user/", "") });
  }
  return guests;
}

const SOCIAL_LABEL = { twitter: "x" };
const SOCIAL_KEYS = ["linkedin", "instagram", "twitter", "website", "youtube", "tiktok", "github"];

function socialsHtml(socials = {}) {
  const items = SOCIAL_KEYS
    .filter((k) => socials[k])
    .map((k) => `<a href="${escapeAttr(socials[k])}" target="_blank" rel="noopener">${SOCIAL_LABEL[k] || k}</a>`);
  return items.length ? `<span class="soc">${items.join("")}</span>` : '<span class="empty">—</span>';
}

function personHtml(p) {
  if (p.error) {
    return `<div class="person"><h3>${escapeHtml(p.profileUrl)}</h3>
      <div class="meta">could not fetch — ${escapeHtml(p.error)}</div></div>`;
  }
  const events = (p.hostedEvents || []).map((ev) =>
    `<li><a href="${escapeAttr(ev.url || "#")}" target="_blank" rel="noopener">${escapeHtml(ev.name || ev.url)}</a></li>`
  ).join("");
  return `<div class="person">
    <h3>${escapeHtml(p.name || p.username || "(unknown)")}</h3>
    <div class="meta"><span class="lbl">profile</span><a href="${escapeAttr(p.profileUrl)}" target="_blank" rel="noopener">${escapeHtml(p.profileUrl.replace("https://luma.com", "luma.com"))}</a></div>
    <div class="meta"><span class="lbl">socials</span>${socialsHtml(p.socials)}</div>
    ${p.bio ? `<div class="bio">${escapeHtml(p.bio)}</div>` : ""}
    <div class="meta"><span class="lbl">attended</span>${p.attendedCount ?? "?"} &nbsp;·&nbsp; hosted ${p.hostedCount ?? "?"}</div>
    ${events ? `<ul class="events">${events}</ul>` : ""}
  </div>`;
}

function renderPeople(people) {
  const ok = people.filter((p) => !p.error);
  stat.textContent = `${ok.length} people resolved`;
  results.innerHTML = people.length
    ? people.map(personHtml).join("")
    : '<div class="empty">No one resolved.</div>';
}

function escapeHtml(s = "") {
  return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
function escapeAttr(s = "") {
  return String(s).replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

function setStatus(msg, isErr = false) {
  statusEl.textContent = msg || "";
  statusEl.classList.toggle("err", !!isErr);
}
function setBar(done, total) {
  if (!total) { bar.style.display = "none"; return; }
  bar.style.display = "block";
  barFill.style.width = Math.round((done / total) * 100) + "%";
}

async function enrich(guests) {
  setStatus("Building the rolodex in the background — reading profiles…");
  setBar(0, 1);
  let jobId;
  try {
    const res = await fetch("/api/enrich", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ guests }),
    });
    if (!res.ok) throw new Error(`server responded ${res.status}`);
    ({ jobId } = await res.json());
  } catch (e) {
    setBar(0, 0);
    setStatus(`Couldn't reach the local server (${e.message}). Start it with "npm start", then reload this page.`, true);
    return;
  }
  poll(jobId);
}

async function poll(jobId) {
  let res;
  try {
    res = await (await fetch(`/api/enrich/${jobId}`)).json();
  } catch (e) {
    setStatus(`Lost contact with the server (${e.message}).`, true);
    return;
  }
  const pr = res.progress || {};
  if (res.status === "running") {
    const label = pr.phase === "descriptions" ? "Reading hosted-event descriptions" : "Reading profiles";
    setBar(pr.done || 0, pr.total || 1);
    setStatus(`${label} — ${pr.done || 0}/${pr.total || "?"} · ${pr.message || ""}`);
    setTimeout(() => poll(jobId), 600);
    return;
  }
  if (res.status === "error") {
    setBar(0, 0);
    setStatus(res.error || "enrichment failed", true);
    return;
  }
  // done
  setBar(1, 1);
  setStatus(`Done — ${res.result.people.filter(p => !p.error).length} profiles resolved.`);
  renderPeople(res.result.people);
  if (res.result.files) {
    filesEl.innerHTML =
      `Also saved for manual access: <code>${escapeHtml(res.result.files.people)}</code> and <code>${escapeHtml(res.result.files.events)}</code>.`;
  }
}

zone.addEventListener("paste", (e) => {
  e.preventDefault();
  const cd = e.clipboardData || window.clipboardData;
  const html = cd.getData("text/html");
  state.guests = html ? parseHtml(html) : [];
  if (!state.guests.length) {
    zone.innerHTML = `<div class="empty">No Luma profile links found. Select the guest-list rows (each name links to /user/…) and copy again.</div>`;
    setStatus("");
    setBar(0, 0);
    return;
  }
  zone.innerHTML = `<div class="empty">Captured ${state.guests.length} guests. Enriching…</div>`;
  results.innerHTML = '<div class="empty">Working…</div>';
  filesEl.textContent = "";
  stat.textContent = `${state.guests.length} captured`;
  enrich(state.guests);
});

document.getElementById("clear").addEventListener("click", () => {
  state.guests = [];
  zone.innerHTML = "";
  results.innerHTML = '<div class="empty">Nothing captured yet.</div>';
  stat.textContent = "";
  filesEl.textContent = "";
  setStatus("");
  setBar(0, 0);
});
</script>
</body>
</html>
